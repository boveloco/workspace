common:
  enabled: true
  clusterIssuer: letsencrypt-prod

  unprivileged: true

  defaultImagePullSecrets:
    enabled: true

  cronjob:
    enabled: false

  deployment:
    imagePullSecrets: dockerhub-token
    enabled: true
    port: 8080
    replicaCount: 2
    image: glanceapp/glance
    resources:
      requests:
        memory: "64Mi"
        cpu: 50m
      limits:
        memory: "256Mi"
        cpu: 200m
    env:
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"

  configMapVolumeMounts:
  - name: glance
    mountPath: /app/config/glance.yml
    subPath: glance.yml

  service:
    enabled: true
    ports:
    - port: 80
      targetPort: 8080
      name: http
      type: ClusterIP
  ingress:
    enabled: false
    class: cilium
    hosts:
    - host: start.k8s.nullservers.com
